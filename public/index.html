<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Steam 等级趋势图</title>
    <meta
      name="description"
      content="根据 Steam 勋章获得时间，绘制从注册到现在的经验值与等级趋势折线图。"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&family=Noto+Serif+SC:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  </head>
  <body>
    <button id="lang-toggle" class="lang-toggle" type="button">EN</button>

    <a
      class="github-link"
      href="https://github.com/yingzeliangzi/steam-level-trend"
      target="_blank"
      rel="noopener"
      data-i18n-aria="ghLabel"
      data-i18n-title="ghLabel"
    >
      <svg viewBox="0 0 16 16" width="28" height="28" aria-hidden="true" fill="currentColor">
        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"></path>
      </svg>
    </a>

    <main class="container">
      <header class="hero">
        <h1 data-i18n="title">Steam 等级趋势图</h1>
        <p class="subtitle" data-i18n="subtitle">
          看看你的经验值与等级，是如何随时间一路涨上来的。
        </p>
      </header>

      <form id="search-form" class="search">
        <input
          id="user-input"
          type="text"
          autocomplete="off"
          data-i18n-placeholder="placeholder"
          placeholder="自定义 URL 名 / SteamID64 / 好友代码 / SteamID3 / 资料链接（如 nasakura）"
          data-i18n-aria="inputAria"
        />
        <button type="submit" id="search-btn" data-i18n="search">查询</button>
      </form>

      <p id="status" class="status" role="status"></p>

      <section id="profile-card" class="profile-card hidden">
        <img id="avatar" class="avatar" alt="" />
        <div class="profile-meta">
          <a id="persona" class="persona" target="_blank" rel="noopener"></a>
          <div class="stats">
            <span class="stat">
              <span class="stat-label" data-i18n="statLevel">当前等级</span>
              <span id="stat-level" class="stat-value">—</span>
            </span>
            <span class="stat">
              <span class="stat-label" data-i18n="statJoined">注册于</span>
              <span id="stat-created" class="stat-value">—</span>
            </span>
            <span class="stat">
              <span class="stat-label" data-i18n="statBadges">纳入统计勋章</span>
              <span id="stat-badges" class="stat-value">—</span>
            </span>
          </div>
        </div>
      </section>

      <section id="chart-wrap" class="chart-wrap hidden">
        <div id="chart" class="chart"></div>
        <p class="note" data-i18n="note">
          趋势已排除「游戏收藏家」「服役年限」等会随时间累积的勋章，
          因此曲线末端等级可能略低于上方显示的实际等级。
        </p>
      </section>

      <footer class="footer">
        <span data-i18n="footer">数据来源：Steam Web API · 需对方资料公开</span>
      </footer>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
